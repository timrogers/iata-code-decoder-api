name: Approve PRs with tests

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get changed files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const testFiles = files.filter(f =>
              f.filename.includes('__tests__/') ||
              /\.(test|spec)\.[^.]+$/.test(f.filename)
            );
            core.setOutput('has_tests', testFiles.length > 0 ? 'true' : 'false');
            if (testFiles.length > 0) {
              core.info(`Found ${testFiles.length} test file(s): ${testFiles.map(f => f.filename).join(', ')}`);
            }

      - name: Approve PR
        if: steps.changed-files.outputs.has_tests == 'true'
        run: gh pr review ${{ github.event.pull_request.number }} --approve --body "Approved: this PR includes test file changes."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
