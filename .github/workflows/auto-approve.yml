name: Auto-approve PRs with test changes

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Check for test file changes
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const testPatterns = [
              /^__tests__\//,
              /\.test\.[jt]sx?$/,
              /\.spec\.[jt]sx?$/,
            ];

            const hasTestFile = files.some(f =>
              testPatterns.some(p => p.test(f.filename))
            );

            core.setOutput('has_test_file', String(hasTestFile));

      - name: Approve PR
        if: steps.check.outputs.has_test_file == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
            });
