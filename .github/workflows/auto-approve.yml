name: Auto-approve PRs with test changes

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for test file changes
        id: check-tests
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed_test_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '__tests__/**/*.test.ts' | wc -l)
          echo "count=$changed_test_files" >> "$GITHUB_OUTPUT"

      - name: Approve PR
        if: steps.check-tests.outputs.count > 0
        run: gh pr review ${{ github.event.pull_request.number }} --approve --body "Auto-approved: this PR includes test file changes."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
