name: Auto-approve PRs with test changes

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Check for test file changes
        id: check-tests
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const hasTestFiles = files.data.some(file =>
              file.filename.includes('__tests__') ||
              /\.(test|spec)\.[jt]sx?$/.test(file.filename)
            );

            core.setOutput('has_tests', hasTestFiles ? 'true' : 'false');
            console.log(`Test files present: ${hasTestFiles}`);
            if (hasTestFiles) {
              console.log('Test files changed:');
              files.data
                .filter(f => f.filename.includes('__tests__') || /\.(test|spec)\.[jt]sx?$/.test(f.filename))
                .forEach(f => console.log(` - ${f.filename}`));
            }

      - name: Approve PR
        if: steps.check-tests.outputs.has_tests == 'true'
        run: gh pr review "$PR_NUMBER" --approve --repo "$REPO" --body "Auto-approved: this PR creates or updates at least one test file."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
