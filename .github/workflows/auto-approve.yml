name: Auto-approve PRs with test changes

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Check for test file changes
        id: check-tests
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const testFilePattern = /(__tests__|\.test\.|\.spec\.)/;
            const hasTestFiles = files.some(f => testFilePattern.test(f.filename));

            core.setOutput('has_test_files', hasTestFiles.toString());

      - name: Approve PR
        if: steps.check-tests.outputs.has_test_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
            });
