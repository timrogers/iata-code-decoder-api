name: Auto-approve PRs with tests

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Check for test files and approve
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const hasTestFile = files.some(({ filename }) =>
              /\.(test|spec)\.[^.]+$/.test(filename) ||
              /(^|\/)__tests__\//.test(filename) ||
              /(^|\/)test\//.test(filename) ||
              /(^|\/)tests\//.test(filename) ||
              /(^|\/)spec\//.test(filename)
            );

            if (hasTestFile) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'APPROVE',
              });
              core.info('PR approved: contains test files');
            } else {
              core.info('PR not approved: no test files found');
            }
