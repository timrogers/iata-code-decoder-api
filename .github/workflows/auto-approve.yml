name: Auto-approve PRs with tests

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve if PR includes test files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const testFilePatterns = [
              /\/__tests__\//,
              /\.test\.[jt]sx?$/,
              /\.spec\.[jt]sx?$/,
            ];

            const hasTestFiles = files.some(file =>
              testFilePatterns.some(pattern => pattern.test(file.filename))
            );

            if (hasTestFiles) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'APPROVE',
              });
              core.info('PR approved — test files found');
            } else {
              core.info('PR not approved — no test files found');
            }
