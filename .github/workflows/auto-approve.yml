name: Auto-approve PRs with test changes

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for test file changes
        id: check-tests
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -qE '(^|/)__tests__/|\.test\.[jt]sx?$|\.spec\.[jt]sx?$'; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.check-tests.outputs.has_tests == 'true'
        run: gh pr review "${{ github.event.pull_request.number }}" --approve --body "Auto-approved: this PR includes test file changes."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
