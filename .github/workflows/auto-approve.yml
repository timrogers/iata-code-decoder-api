name: Auto-approve PRs with tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check for test files and approve
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const hasTestFile = files.some(file =>
              file.filename.startsWith('__tests__/') ||
              /\.(test|spec)\.[jt]s$/.test(file.filename)
            );

            if (!hasTestFile) {
              console.log('No test files changed — skipping approval.');
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Auto-approved: this PR includes test file changes.',
            });
            console.log('PR approved.');
