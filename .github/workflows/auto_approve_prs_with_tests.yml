name: Auto-approve PRs with test file changes

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Check for test file changes
        id: test-files
        uses: dorny/paths-filter@v3
        with:
          filters: |
            tests:
              - '__tests__/**'

      - name: Approve PR if test files changed
        if: steps.test-files.outputs.tests == 'true'
        run: gh pr review "${{ github.event.pull_request.number }}" --approve --body "Auto-approved: this PR includes changes to test files."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
