name: Auto-approve PRs with tests

on:
  pull_request:
    types: [opened]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check for test files and approve
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const hasTestFile = files.some(({ filename }) =>
              /(__tests__|\.test\.|\.spec\.)/.test(filename)
            );

            if (hasTestFile) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'APPROVE',
              });
              core.info('Approved: PR includes test file(s).');
            } else {
              core.info('Skipped: PR does not include any test files.');
            }
