name: Auto-approve PRs with test changes

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Check for test file changes
        id: check-tests
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const hasTestFiles = files.some(f =>
              f.filename.includes('__tests__/') ||
              f.filename.endsWith('.test.ts') ||
              f.filename.endsWith('.test.js') ||
              f.filename.endsWith('.spec.ts') ||
              f.filename.endsWith('.spec.js')
            );
            core.setOutput('has_test_files', String(hasTestFiles));

      - name: Approve PR
        if: steps.check-tests.outputs.has_test_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Auto-approved: this PR creates or updates at least one test file.',
            });
